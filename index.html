<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#101522" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="續航力測試" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>續航力測試工具</title>
  <style>
:root {
  color-scheme: dark;
  --bg: #0b0f18;
  --panel: rgba(21, 28, 43, 0.88);
  --panel-strong: #171e2d;
  --border: rgba(255, 255, 255, 0.09);
  --text: #f5f7fb;
  --muted: #99a5ba;
  --accent: #6ee7a8;
  --accent-strong: #37c986;
  --danger: #ff6b79;
  --warning: #ffd166;
  --shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Inter, "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 20% 0%, rgba(61, 201, 134, 0.14), transparent 32rem),
    radial-gradient(circle at 95% 18%, rgba(92, 110, 255, 0.12), transparent 30rem),
    var(--bg);
  color: var(--text);
}

button,
input,
select {
  font: inherit;
}

button {
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.45;
}

.app-shell {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 48px 0 32px;
}

.hero,
.section-heading,
.table-heading,
.button-row,
.inline-input,
.battery-meta {
  display: flex;
  align-items: center;
}

.hero {
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 28px;
}

.eyebrow {
  margin: 0 0 8px;
  color: var(--accent);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0.16em;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 8px;
  font-size: clamp(2rem, 5vw, 3.6rem);
  line-height: 1;
}

h2 {
  margin-bottom: 6px;
  font-size: 1.15rem;
}

.subtitle,
.section-heading p,
footer p {
  margin-bottom: 0;
  color: var(--muted);
}

.status-badge {
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.04);
  color: var(--muted);
  white-space: nowrap;
}

.status-badge.supported {
  color: var(--accent);
  background: rgba(55, 201, 134, 0.1);
}

.status-badge.manual {
  color: var(--warning);
  background: rgba(255, 209, 102, 0.1);
}

.dashboard {
  display: grid;
  grid-template-columns: 1.4fr repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 16px;
}

.battery-card,
.metric-card,
.panel {
  border: 1px solid var(--border);
  background: linear-gradient(145deg, rgba(28, 37, 55, 0.92), rgba(15, 20, 31, 0.92));
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.battery-card,
.metric-card {
  min-height: 154px;
  padding: 22px;
  border-radius: 22px;
}

.battery-card {
  grid-row: span 2;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.battery-visual {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 18px;
}

.battery-body {
  position: relative;
  flex: 1;
  height: 68px;
  overflow: hidden;
  border: 3px solid rgba(255, 255, 255, 0.72);
  border-radius: 13px;
}

.battery-cap {
  width: 8px;
  height: 28px;
  border-radius: 0 5px 5px 0;
  background: rgba(255, 255, 255, 0.72);
}

.battery-fill {
  position: absolute;
  inset: 0 auto 0 0;
  width: 0%;
  background: linear-gradient(90deg, var(--accent-strong), var(--accent));
  transition: width 0.45s ease;
}

#batteryPercentText {
  position: relative;
  z-index: 1;
  display: grid;
  height: 100%;
  place-items: center;
  color: #07110c;
  font-size: 1.35rem;
  font-weight: 900;
  mix-blend-mode: luminosity;
}

.battery-meta {
  justify-content: space-between;
  gap: 14px;
  color: var(--muted);
  font-size: 0.9rem;
}

.metric-card {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.metric-card span {
  color: var(--muted);
  font-size: 0.9rem;
}

.metric-card strong {
  font-size: clamp(1.25rem, 3vw, 1.9rem);
}

.panel {
  margin-top: 16px;
  padding: 24px;
  border-radius: 22px;
}

.section-heading {
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 20px;
}

.control-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

label {
  color: var(--muted);
  font-size: 0.9rem;
}

input,
select {
  width: 100%;
  margin-top: 8px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 12px;
  outline: none;
  background: rgba(255, 255, 255, 0.055);
  color: var(--text);
}

input:focus,
select:focus {
  border-color: rgba(110, 231, 168, 0.72);
  box-shadow: 0 0 0 3px rgba(110, 231, 168, 0.1);
}

.manual-input {
  margin-top: 18px;
  padding: 16px;
  border: 1px dashed rgba(255, 209, 102, 0.35);
  border-radius: 16px;
  background: rgba(255, 209, 102, 0.05);
}

.inline-input {
  gap: 10px;
  margin-top: 8px;
}

.inline-input input {
  max-width: 130px;
  margin-top: 0;
}

.button-row {
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 22px;
}

.button-row.compact {
  margin-top: 0;
}

button {
  min-height: 42px;
  padding: 10px 16px;
  border: 0;
  border-radius: 12px;
  font-weight: 800;
}

.primary-button {
  background: var(--accent);
  color: #07110c;
}

.secondary-button {
  background: rgba(255, 255, 255, 0.09);
  color: var(--text);
}

.danger-button {
  background: rgba(255, 107, 121, 0.15);
  color: #ff9ba5;
}

.ghost-button {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
}

.chart-wrap {
  min-height: 320px;
  overflow: hidden;
  border-radius: 16px;
  background: rgba(0, 0, 0, 0.12);
}

canvas {
  display: block;
  width: 100%;
  height: 320px;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th,
td {
  padding: 14px 12px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  white-space: nowrap;
}

th {
  color: var(--muted);
  font-size: 0.8rem;
  font-weight: 700;
}

td {
  font-size: 0.9rem;
}

.empty-row td {
  padding: 34px;
  color: var(--muted);
  text-align: center;
}

.hidden {
  display: none;
}

footer {
  padding: 24px 6px 0;
  font-size: 0.82rem;
  text-align: center;
}

@media (max-width: 900px) {
  .dashboard {
    grid-template-columns: repeat(2, 1fr);
  }

  .battery-card {
    grid-column: span 2;
    grid-row: auto;
  }
}

@media (max-width: 640px) {
  .app-shell {
    width: min(100% - 20px, 1180px);
    padding-top: 24px;
  }

  .hero,
  .section-heading,
  .table-heading {
    align-items: flex-start;
    flex-direction: column;
  }

  .dashboard,
  .control-grid {
    grid-template-columns: 1fr;
  }

  .battery-card {
    grid-column: auto;
  }

  .battery-meta {
    align-items: flex-start;
    flex-direction: column;
  }

  .button-row.compact {
    width: 100%;
  }

  .button-row.compact button {
    flex: 1;
  }
}

</style>
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">BATTERY ENDURANCE TEST</p>
        <h1>續航力測試工具</h1>
        <p class="subtitle">記錄電量變化、平均耗電速度與預估總續航時間。</p>
      </div>
      <div id="apiBadge" class="status-badge">檢查電池 API 中</div>
    </header>

    <section class="dashboard">
      <article class="battery-card">
        <div class="battery-visual" aria-label="目前電池電量">
          <div class="battery-body">
            <div id="batteryFill" class="battery-fill"></div>
            <span id="batteryPercentText">--%</span>
          </div>
          <div class="battery-cap"></div>
        </div>
        <div class="battery-meta">
          <span id="chargingState">狀態：未知</span>
          <span id="currentPowerSource">電源：未知</span>
        </div>
      </article>

      <article class="metric-card">
        <span>測試時間</span>
        <strong id="elapsedTime">00:00:00</strong>
      </article>

      <article class="metric-card">
        <span>已消耗電量</span>
        <strong id="consumedPercent">0.0%</strong>
      </article>

      <article class="metric-card">
        <span>平均耗電速度</span>
        <strong id="drainRate">-- % / 小時</strong>
      </article>

      <article class="metric-card">
        <span>預估總續航</span>
        <strong id="estimatedRuntime">--</strong>
      </article>

      <article class="metric-card">
        <span>預估剩餘時間</span>
        <strong id="estimatedRemaining">--</strong>
      </article>
    </section>

    <section class="panel controls-panel">
      <div class="section-heading">
        <div>
          <h2>測試控制</h2>
          <p>建議拔除充電器後再開始測試，並維持固定亮度與使用情境。</p>
        </div>
      </div>

      <div class="control-grid">
        <label>
          測試名稱
          <input id="testName" type="text" value="一般使用續航測試" />
        </label>

        <label>
          測試情境
          <select id="testScenario">
            <option>一般使用</option>
            <option>影片播放</option>
            <option>遊戲</option>
            <option>辦公文書</option>
            <option>網頁瀏覽</option>
            <option>待機</option>
            <option>自訂</option>
          </select>
        </label>

        <label>
          螢幕亮度
          <input id="brightness" type="text" placeholder="例如：50%" />
        </label>

        <label>
          備註
          <input id="notes" type="text" placeholder="例如：Wi-Fi 開啟、藍牙關閉" />
        </label>
      </div>

      <div id="manualInputBox" class="manual-input hidden">
        <label>
          手動輸入目前電量
          <div class="inline-input">
            <input id="manualBatteryLevel" type="number" min="0" max="100" value="100" />
            <span>%</span>
            <button id="recordManualButton" class="secondary-button">記錄目前電量</button>
          </div>
        </label>
      </div>

      <div class="button-row">
        <button id="startButton" class="primary-button">開始測試</button>
        <button id="pauseButton" class="secondary-button" disabled>暫停</button>
        <button id="stopButton" class="danger-button" disabled>結束測試</button>
        <button id="resetButton" class="ghost-button">重設</button>
      </div>
    </section>

    <section class="panel">
      <div class="section-heading">
        <div>
          <h2>耗電趨勢</h2>
          <p>圖表會依照記錄資料即時更新。</p>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="batteryChart" width="1200" height="360"></canvas>
      </div>
    </section>

    <section class="panel">
      <div class="section-heading table-heading">
        <div>
          <h2>測試紀錄</h2>
          <p id="recordCount">目前 0 筆資料</p>
        </div>
        <div class="button-row compact">
          <button id="addRecordButton" class="secondary-button">立即記錄</button>
          <button id="exportButton" class="ghost-button">匯出 CSV</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>時間</th>
              <th>經過時間</th>
              <th>電量</th>
              <th>充電狀態</th>
              <th>備註</th>
            </tr>
          </thead>
          <tbody id="recordsBody">
            <tr class="empty-row">
              <td colspan="5">尚未開始測試</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <footer>
      <p>提示：部分桌面瀏覽器已不提供 Battery Status API，因此網站會自動切換成手動輸入模式。</p>
    </footer>
  </main>

  <script>
const state = {
  battery: null,
  currentLevel: null,
  charging: null,
  records: [],
  testStartAt: null,
  pausedAt: null,
  totalPausedMs: 0,
  running: false,
  paused: false,
  timer: null,
  autoRecordTimer: null,
  manualMode: false
};

const $ = (id) => document.getElementById(id);

const elements = {
  apiBadge: $("apiBadge"),
  batteryFill: $("batteryFill"),
  batteryPercentText: $("batteryPercentText"),
  chargingState: $("chargingState"),
  currentPowerSource: $("currentPowerSource"),
  elapsedTime: $("elapsedTime"),
  consumedPercent: $("consumedPercent"),
  drainRate: $("drainRate"),
  estimatedRuntime: $("estimatedRuntime"),
  estimatedRemaining: $("estimatedRemaining"),
  testName: $("testName"),
  testScenario: $("testScenario"),
  brightness: $("brightness"),
  notes: $("notes"),
  manualInputBox: $("manualInputBox"),
  manualBatteryLevel: $("manualBatteryLevel"),
  recordManualButton: $("recordManualButton"),
  startButton: $("startButton"),
  pauseButton: $("pauseButton"),
  stopButton: $("stopButton"),
  resetButton: $("resetButton"),
  addRecordButton: $("addRecordButton"),
  exportButton: $("exportButton"),
  recordsBody: $("recordsBody"),
  recordCount: $("recordCount"),
  batteryChart: $("batteryChart")
};

function formatDuration(ms) {
  const totalSeconds = Math.max(0, Math.floor(ms / 1000));
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  return [hours, minutes, seconds].map(v => String(v).padStart(2, "0")).join(":");
}

function formatHours(hours) {
  if (!Number.isFinite(hours) || hours <= 0) return "--";
  const totalMinutes = Math.round(hours * 60);
  const h = Math.floor(totalMinutes / 60);
  const m = totalMinutes % 60;
  return h > 0 ? `${h} 小時 ${m} 分` : `${m} 分鐘`;
}

function getElapsedMs() {
  if (!state.testStartAt) return 0;
  const end = state.paused && state.pausedAt ? state.pausedAt : Date.now();
  return Math.max(0, end - state.testStartAt - state.totalPausedMs);
}

function updateBatteryDisplay() {
  const level = state.currentLevel;
  if (level === null) {
    elements.batteryFill.style.width = "0%";
    elements.batteryPercentText.textContent = "--%";
  } else {
    elements.batteryFill.style.width = `${level}%`;
    elements.batteryPercentText.textContent = `${level.toFixed(0)}%`;
    elements.manualBatteryLevel.value = Math.round(level);
  }

  const chargingText = state.charging === null
    ? "狀態：未知"
    : state.charging
      ? "狀態：充電中"
      : "狀態：使用電池";

  elements.chargingState.textContent = chargingText;
  elements.currentPowerSource.textContent = state.charging === null
    ? "電源：未知"
    : state.charging
      ? "電源：外接電源"
      : "電源：電池";
}

function computeMetrics() {
  if (state.records.length < 2) {
    return {
      consumed: 0,
      rate: null,
      totalRuntime: null,
      remaining: null
    };
  }

  const first = state.records[0];
  const last = state.records[state.records.length - 1];
  const consumed = Math.max(0, first.level - last.level);
  const hours = (last.elapsedMs - first.elapsedMs) / 3600000;
  const rate = hours > 0 && consumed > 0 ? consumed / hours : null;
  const totalRuntime = rate ? 100 / rate : null;
  const remaining = rate ? last.level / rate : null;

  return { consumed, rate, totalRuntime, remaining };
}

function updateMetrics() {
  const elapsed = getElapsedMs();
  const metrics = computeMetrics();

  elements.elapsedTime.textContent = formatDuration(elapsed);
  elements.consumedPercent.textContent = `${metrics.consumed.toFixed(1)}%`;
  elements.drainRate.textContent = metrics.rate ? `${metrics.rate.toFixed(2)} % / 小時` : "-- % / 小時";
  elements.estimatedRuntime.textContent = formatHours(metrics.totalRuntime);
  elements.estimatedRemaining.textContent = formatHours(metrics.remaining);
}

function addRecord(note = "") {
  if (state.currentLevel === null) {
    alert("目前沒有電量資料，請先手動輸入目前電量。");
    return;
  }

  const elapsedMs = getElapsedMs();

  const last = state.records[state.records.length - 1];
  if (
    last &&
    Math.abs(last.level - state.currentLevel) < 0.01 &&
    elapsedMs - last.elapsedMs < 30000 &&
    !note
  ) {
    return;
  }

  state.records.push({
    timestamp: new Date(),
    elapsedMs,
    level: Number(state.currentLevel.toFixed(2)),
    charging: state.charging,
    note
  });

  renderRecords();
  updateMetrics();
  drawChart();
  saveSession();
}

function renderRecords() {
  elements.recordCount.textContent = `目前 ${state.records.length} 筆資料`;

  if (state.records.length === 0) {
    elements.recordsBody.innerHTML = `
      <tr class="empty-row">
        <td colspan="5">尚未開始測試</td>
      </tr>`;
    return;
  }

  elements.recordsBody.innerHTML = [...state.records].reverse().map(record => `
    <tr>
      <td>${record.timestamp.toLocaleString("zh-TW", { hour12: false })}</td>
      <td>${formatDuration(record.elapsedMs)}</td>
      <td>${record.level.toFixed(1)}%</td>
      <td>${record.charging === null ? "未知" : record.charging ? "充電中" : "使用電池"}</td>
      <td>${escapeHtml(record.note || "")}</td>
    </tr>
  `).join("");
}

function escapeHtml(text) {
  return text.replace(/[&<>"']/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[char]));
}

function startTest() {
  if (state.currentLevel === null) {
    alert("請先輸入目前電量。");
    return;
  }

  if (!state.testStartAt) {
    state.testStartAt = Date.now();
    state.totalPausedMs = 0;
    state.records = [];
  }

  state.running = true;
  state.paused = false;
  state.pausedAt = null;

  elements.startButton.disabled = true;
  elements.pauseButton.disabled = false;
  elements.stopButton.disabled = false;

  addRecord("測試開始");
  startTimers();
  saveSession();
}

function pauseTest() {
  if (!state.running || state.paused) return;

  state.paused = true;
  state.pausedAt = Date.now();
  elements.pauseButton.textContent = "繼續";
  stopTimers();
  addRecord("測試暫停");
  updateMetrics();
  saveSession();
}

function resumeTest() {
  if (!state.paused || !state.pausedAt) return;

  state.totalPausedMs += Date.now() - state.pausedAt;
  state.pausedAt = null;
  state.paused = false;
  elements.pauseButton.textContent = "暫停";
  addRecord("測試繼續");
  startTimers();
  saveSession();
}

function stopTest() {
  if (!state.testStartAt) return;

  addRecord("測試結束");
  state.running = false;
  state.paused = false;
  state.pausedAt = null;
  stopTimers();

  elements.startButton.disabled = false;
  elements.startButton.textContent = "重新開始測試";
  elements.pauseButton.disabled = true;
  elements.pauseButton.textContent = "暫停";
  elements.stopButton.disabled = true;

  updateMetrics();
  saveSession();
}

function resetTest() {
  if (!confirm("確定要清除目前測試紀錄嗎？")) return;

  stopTimers();
  state.records = [];
  state.testStartAt = null;
  state.pausedAt = null;
  state.totalPausedMs = 0;
  state.running = false;
  state.paused = false;

  elements.startButton.disabled = false;
  elements.startButton.textContent = "開始測試";
  elements.pauseButton.disabled = true;
  elements.pauseButton.textContent = "暫停";
  elements.stopButton.disabled = true;

  renderRecords();
  updateMetrics();
  drawChart();
  localStorage.removeItem("batteryEnduranceSession");
}

function startTimers() {
  stopTimers();
  state.timer = setInterval(updateMetrics, 1000);
  state.autoRecordTimer = setInterval(() => addRecord(), 60000);
}

function stopTimers() {
  clearInterval(state.timer);
  clearInterval(state.autoRecordTimer);
  state.timer = null;
  state.autoRecordTimer = null;
}

function drawChart() {
  const canvas = elements.batteryChart;
  const ctx = canvas.getContext("2d");
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;

  canvas.width = Math.max(600, Math.floor(rect.width * dpr));
  canvas.height = Math.floor(320 * dpr);
  ctx.scale(dpr, dpr);

  const width = rect.width;
  const height = 320;
  const padding = { left: 52, right: 20, top: 20, bottom: 38 };

  ctx.clearRect(0, 0, width, height);

  ctx.strokeStyle = "rgba(255,255,255,0.09)";
  ctx.fillStyle = "#99a5ba";
  ctx.font = "12px system-ui";

  for (let y = 0; y <= 100; y += 20) {
    const py = padding.top + (100 - y) / 100 * (height - padding.top - padding.bottom);
    ctx.beginPath();
    ctx.moveTo(padding.left, py);
    ctx.lineTo(width - padding.right, py);
    ctx.stroke();
    ctx.fillText(`${y}%`, 10, py + 4);
  }

  if (state.records.length === 0) {
    ctx.fillStyle = "#99a5ba";
    ctx.textAlign = "center";
    ctx.fillText("開始測試後，耗電趨勢會顯示在這裡", width / 2, height / 2);
    ctx.textAlign = "left";
    return;
  }

  const maxElapsed = Math.max(
    state.records[state.records.length - 1].elapsedMs,
    1
  );
  const plotWidth = width - padding.left - padding.right;
  const plotHeight = height - padding.top - padding.bottom;

  const points = state.records.map(record => ({
    x: padding.left + (record.elapsedMs / maxElapsed) * plotWidth,
    y: padding.top + ((100 - record.level) / 100) * plotHeight
  }));

  const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
  gradient.addColorStop(0, "rgba(110,231,168,0.28)");
  gradient.addColorStop(1, "rgba(110,231,168,0.01)");

  ctx.beginPath();
  ctx.moveTo(points[0].x, height - padding.bottom);
  points.forEach(point => ctx.lineTo(point.x, point.y));
  ctx.lineTo(points[points.length - 1].x, height - padding.bottom);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();

  ctx.beginPath();
  points.forEach((point, index) => {
    if (index === 0) ctx.moveTo(point.x, point.y);
    else ctx.lineTo(point.x, point.y);
  });
  ctx.strokeStyle = "#6ee7a8";
  ctx.lineWidth = 3;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  ctx.stroke();

  points.forEach(point => {
    ctx.beginPath();
    ctx.arc(point.x, point.y, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = "#6ee7a8";
    ctx.fill();
  });

  ctx.fillStyle = "#99a5ba";
  ctx.textAlign = "center";
  ctx.fillText("經過時間", width / 2, height - 10);
  ctx.textAlign = "left";
}

function exportCsv() {
  if (state.records.length === 0) {
    alert("目前沒有可以匯出的測試紀錄。");
    return;
  }

  const metrics = computeMetrics();
  const metadata = [
    ["測試名稱", elements.testName.value],
    ["測試情境", elements.testScenario.value],
    ["螢幕亮度", elements.brightness.value],
    ["備註", elements.notes.value],
    ["測試時間", formatDuration(getElapsedMs())],
    ["平均耗電速度", metrics.rate ? `${metrics.rate.toFixed(2)} %/小時` : ""],
    ["預估總續航", formatHours(metrics.totalRuntime)],
    []
  ];

  const rows = [
    ...metadata,
    ["記錄時間", "經過時間", "電量", "充電狀態", "備註"],
    ...state.records.map(record => [
      record.timestamp.toLocaleString("zh-TW", { hour12: false }),
      formatDuration(record.elapsedMs),
      `${record.level.toFixed(1)}%`,
      record.charging === null ? "未知" : record.charging ? "充電中" : "使用電池",
      record.note || ""
    ])
  ];

  const csv = "\uFEFF" + rows
    .map(row => row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(","))
    .join("\n");

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  const safeName = (elements.testName.value || "續航力測試").replace(/[\\/:*?"<>|]/g, "_");

  link.href = url;
  link.download = `${safeName}_${new Date().toISOString().slice(0, 10)}.csv`;
  link.click();
  URL.revokeObjectURL(url);
}

function saveSession() {
  const payload = {
    testName: elements.testName.value,
    testScenario: elements.testScenario.value,
    brightness: elements.brightness.value,
    notes: elements.notes.value,
    records: state.records.map(record => ({
      ...record,
      timestamp: record.timestamp.toISOString()
    })),
    testStartAt: state.testStartAt,
    pausedAt: state.pausedAt,
    totalPausedMs: state.totalPausedMs,
    running: state.running,
    paused: state.paused
  };

  localStorage.setItem("batteryEnduranceSession", JSON.stringify(payload));
}

function restoreSession() {
  try {
    const raw = localStorage.getItem("batteryEnduranceSession");
    if (!raw) return;

    const data = JSON.parse(raw);
    elements.testName.value = data.testName || elements.testName.value;
    elements.testScenario.value = data.testScenario || elements.testScenario.value;
    elements.brightness.value = data.brightness || "";
    elements.notes.value = data.notes || "";

    state.records = (data.records || []).map(record => ({
      ...record,
      timestamp: new Date(record.timestamp)
    }));
    state.testStartAt = data.testStartAt || null;
    state.pausedAt = data.pausedAt || null;
    state.totalPausedMs = data.totalPausedMs || 0;
    state.running = Boolean(data.running);
    state.paused = Boolean(data.paused);

    if (state.running) {
      elements.startButton.disabled = true;
      elements.pauseButton.disabled = false;
      elements.stopButton.disabled = false;

      if (state.paused) {
        elements.pauseButton.textContent = "繼續";
      } else {
        startTimers();
      }
    }

    renderRecords();
    updateMetrics();
    drawChart();
  } catch (error) {
    console.warn("無法還原上次測試資料：", error);
  }
}

async function initBatteryApi() {
  if ("getBattery" in navigator) {
    try {
      state.battery = await navigator.getBattery();
      state.manualMode = false;
      elements.apiBadge.textContent = "自動讀取電量";
      elements.apiBadge.classList.add("supported");

      const syncBattery = () => {
        state.currentLevel = state.battery.level * 100;
        state.charging = state.battery.charging;
        updateBatteryDisplay();

        if (state.running && !state.paused) {
          const last = state.records[state.records.length - 1];
          if (!last || Math.abs(last.level - state.currentLevel) >= 0.5) {
            addRecord();
          }
        }
      };

      syncBattery();
      state.battery.addEventListener("levelchange", syncBattery);
      state.battery.addEventListener("chargingchange", syncBattery);
      return;
    } catch (error) {
      console.warn("Battery API 無法使用：", error);
    }
  }

  state.manualMode = true;
  state.currentLevel = Number(elements.manualBatteryLevel.value);
  state.charging = false;
  elements.manualInputBox.classList.remove("hidden");
  elements.apiBadge.textContent = "手動輸入模式";
  elements.apiBadge.classList.add("manual");
  updateBatteryDisplay();
}

elements.startButton.addEventListener("click", startTest);
elements.pauseButton.addEventListener("click", () => {
  if (state.paused) resumeTest();
  else pauseTest();
});
elements.stopButton.addEventListener("click", stopTest);
elements.resetButton.addEventListener("click", resetTest);
elements.addRecordButton.addEventListener("click", () => addRecord("手動記錄"));
elements.exportButton.addEventListener("click", exportCsv);

elements.recordManualButton.addEventListener("click", () => {
  const value = Number(elements.manualBatteryLevel.value);
  if (!Number.isFinite(value) || value < 0 || value > 100) {
    alert("請輸入 0 到 100 之間的電量。");
    return;
  }
  state.currentLevel = value;
  updateBatteryDisplay();
  if (state.running) addRecord("手動更新電量");
});

["testName", "testScenario", "brightness", "notes"].forEach(id => {
  elements[id].addEventListener("change", saveSession);
});

window.addEventListener("resize", drawChart);
window.addEventListener("beforeunload", saveSession);

restoreSession();
initBatteryApi();
updateBatteryDisplay();
updateMetrics();
drawChart();


if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(error => {
      console.warn("Service Worker 註冊失敗：", error);
    });
  });
}

</script>
</body>
