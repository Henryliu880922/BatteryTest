<!doctype html><html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Battery Endurance Tester</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#101522">
<style>
body{font-family:system-ui,-apple-system,sans-serif;background:#101522;color:#fff;margin:0;padding:24px}
.card{max-width:700px;margin:auto;background:#1b2233;padding:24px;border-radius:16px}
button{padding:12px 18px;border:0;border-radius:10px;background:#53d58a;font-weight:bold}
input{padding:10px;width:80px}
</style></head>
<body><div class="card">
<h1>🔋 續航力測試</h1>
<p>目前電量：</p>
<input id="b" type="number" min="0" max="100" value="100"> %
<button onclick="rec()">記錄</button>
<ul id="list"></ul>
</div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
let data=JSON.parse(localStorage.getItem('battery')||'[]');
const list=document.getElementById('list');
function draw(){list.innerHTML=data.map(x=>`<li>${x.time} - ${x.level}%</li>`).join('')}
function rec(){
data.push({time:new Date().toLocaleString(),level:document.getElementById('b').value});
localStorage.setItem('battery',JSON.stringify(data));
draw();
}
draw();
</script></body></html>
